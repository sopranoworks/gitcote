agent:
  role: reviewer
  display_name: "Reviewer (gemini)"
  command: 'gemini -p "$PROMPT"'
  prompt: |
    Review PR $PR_ID ($SOURCE_BRANCH → $TARGET_BRANCH).

    Directive: $DIRECTIVE
    Coder's report: $REPORT

    1. Connect to GitYard MCP and read the PR diff
    2. Check against the directive requirements
    3. Write a review report to Shoka
    4. Call approve_pull_request or reject_pull_request
