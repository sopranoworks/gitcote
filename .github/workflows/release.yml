name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'

      - name: Build frontend (produces server/dist/)
        run: cd build/frontend && go run .

      - name: Cross-build binaries (cgo-free)
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags '-s -w' -o dist/gitcote ./cmd/gitcote

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Package .deb
        env:
          ARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          export ARCH VERSION
          nfpm package -f nfpm.yaml -p deb -t "dist/gitcote_${VERSION}_${ARCH}.deb"

      - name: Publish .deb to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
